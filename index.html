<style>
  :root{
    --bg:#0a0e1a; --bg2:#0f1626; --panel:#131c30; --panel2:#1a2540;
    --border:#26324f; --text:#e6ecf7; --muted:#8c9bb8; --muted2:#5f6f8f;
    --gold:#e8c372; --gold-dim:#a9863e; --cyan:#5fd0d8; --red:#e0726a;
    --green:#7bc47f; --blue:#6aa6e0; --yellow:#e0c45f; --purple:#b08ad8;
    --shadow:0 6px 24px rgba(0,0,0,.45);
    --base:#5fd0d8; --pok:#e8c372; --codex:#b08ad8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(1200px 800px at 70% -10%, #16213d 0%, var(--bg) 55%);
    color:var(--text);
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    font-size:15px; line-height:1.5;
  }
  a{color:var(--cyan);text-decoration:none}
  .app{display:grid;grid-template-columns:320px 1fr;grid-template-rows:auto 1fr;height:100vh;
       grid-template-areas:"header header" "side main";}
  /* Header */
  header{grid-area:header;display:flex;align-items:center;gap:18px;padding:14px 22px;
    background:linear-gradient(180deg,#0c1426,#0a0e1a);border-bottom:1px solid var(--border);}
  header h1{font-size:18px;margin:0;letter-spacing:.5px;font-weight:600;white-space:nowrap}
  header h1 .ti{color:var(--gold)}
  .menu-btn{display:none;align-items:center;justify-content:center;background:var(--panel);
    border:1px solid var(--border);color:var(--text);border-radius:8px;width:38px;height:38px;
    font-size:18px;cursor:pointer;line-height:1;flex:0 0 auto}
  .scrim{display:none}
  .tabs{display:flex;gap:6px;flex-wrap:wrap}
  .tab{padding:7px 14px;border:1px solid var(--border);border-radius:20px;background:var(--panel);
    color:var(--muted);cursor:pointer;font-size:13px;font-weight:600;transition:.15s;user-select:none}
  .tab:hover{color:var(--text);border-color:var(--gold-dim)}
  .tab.active{background:var(--gold);color:#1a1407;border-color:var(--gold)}
  .search-wrap{margin-left:auto;position:relative}
  #search{background:var(--panel);border:1px solid var(--border);color:var(--text);
    border-radius:8px;padding:9px 12px 9px 34px;width:240px;font-size:14px;outline:none}
  #search:focus{border-color:var(--gold-dim)}
  .search-wrap::before{content:"⌕";position:absolute;left:11px;top:50%;transform:translateY(-50%);
    color:var(--muted);font-size:18px}
  /* Sidebar */
  aside{grid-area:side;overflow-y:auto;background:var(--bg2);border-right:1px solid var(--border);padding:12px}
  .filters{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
  .chip{font-size:11px;padding:4px 9px;border-radius:12px;border:1px solid var(--border);
    background:transparent;color:var(--muted);cursor:pointer;font-weight:600}
  .chip.active{color:var(--text)}
  .chip[data-exp="base"].active{border-color:var(--base);background:rgba(95,208,216,.15);color:var(--base)}
  .chip[data-exp="pok"].active{border-color:var(--pok);background:rgba(232,195,114,.15);color:var(--pok)}
  .chip[data-exp="codex"].active{border-color:var(--codex);background:rgba(176,138,216,.15);color:var(--codex)}
  .chip[data-exp="all"].active{border-color:var(--gold);color:var(--gold)}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:8px;cursor:pointer;
    color:var(--muted);font-size:14px;transition:.12s;border:1px solid transparent}
  .nav-item:hover{background:var(--panel);color:var(--text)}
  .nav-item.active{background:var(--panel2);color:var(--text);border-color:var(--border)}
  .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 6px rgba(0,0,0,.4)}
  .nav-item .name{flex:1;font-weight:600}
  .badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;letter-spacing:.5px;text-transform:uppercase}
  .badge.base{background:rgba(95,208,216,.15);color:var(--base)}
  .badge.pok{background:rgba(232,195,114,.15);color:var(--pok)}
  .badge.codex{background:rgba(176,138,216,.15);color:var(--codex)}
  .side-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);
    padding:6px 11px;margin-top:6px}
  /* Main */
  main{grid-area:main;overflow-y:auto;padding:28px 36px}
  .content{max-width:1000px;margin:0 auto}
  .faction-head{display:flex;align-items:center;gap:16px;margin-bottom:6px}
  .faction-head .dot{width:26px;height:26px}
  .faction-head h2{margin:0;font-size:30px;font-weight:700}
  .fac-title{display:flex;flex-direction:column}
  .fac-en{font-size:13px;color:var(--muted2);font-weight:600;margin-top:1px}
  .summary{color:var(--muted);font-size:15px;margin:6px 0 22px;font-style:italic}
  section.block{background:var(--panel);border:1px solid var(--border);border-radius:12px;
    padding:18px 20px;margin-bottom:18px;box-shadow:var(--shadow)}
  section.block > h3{margin:0 0 14px;font-size:15px;text-transform:uppercase;letter-spacing:1.2px;
    color:var(--gold);font-weight:700;display:flex;align-items:center;gap:8px}
  section.block > h3::before{content:"";width:4px;height:16px;background:var(--gold);border-radius:2px;display:inline-block}
  .ability{margin-bottom:14px}
  .ability:last-child{margin-bottom:0}
  .ability .ab-name{font-weight:700;color:var(--text)}
  .ability .ab-text{color:var(--muted);margin-top:2px}
  .leader{border-left:3px solid var(--border);padding:4px 0 4px 14px;margin-bottom:16px}
  .leader.agent{border-color:var(--green)}
  .leader.commander{border-color:var(--blue)}
  .leader.hero{border-color:var(--purple)}
  .leader .l-role{font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:700}
  .leader.agent .l-role{color:var(--green)}
  .leader.commander .l-role{color:var(--blue)}
  .leader.hero .l-role{color:var(--purple)}
  .leader .l-name{font-weight:700;font-size:16px;margin:2px 0}
  .leader .l-unlock{font-size:13px;color:var(--cyan);margin-bottom:4px}
  .leader .l-unlock b{color:var(--muted)}
  .leader .l-text{color:var(--muted)}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border)}
  th{color:var(--muted2);font-size:11px;text-transform:uppercase;letter-spacing:.6px;font-weight:700}
  tr:last-child td{border-bottom:none}
  td.num{text-align:center;font-variant-numeric:tabular-nums}
  .pill{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;text-transform:uppercase;letter-spacing:.4px}
  .t-cultural{background:rgba(106,166,224,.18);color:var(--blue)}
  .t-hazardous{background:rgba(224,114,106,.18);color:var(--red)}
  .t-industrial{background:rgba(123,196,127,.18);color:var(--green)}
  .t-green{background:rgba(123,196,127,.18);color:var(--green)}
  .t-blue{background:rgba(106,166,224,.18);color:var(--blue)}
  .t-red{background:rgba(224,114,106,.18);color:var(--red)}
  .t-yellow{background:rgba(224,196,95,.18);color:var(--yellow)}
  .t-unit{background:rgba(232,195,114,.16);color:var(--gold)}
  .kv{display:grid;grid-template-columns:auto 1fr;gap:4px 18px;font-size:14px}
  .kv .k{color:var(--muted2);font-weight:600}
  .statline{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
  .stat{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;text-align:center;min-width:64px}
  .stat .s-lab{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted2)}
  .stat .s-val{font-size:18px;font-weight:700;color:var(--text)}
  .tech-item{padding:10px 0;border-bottom:1px solid var(--border)}
  .tech-item:last-child{border-bottom:none}
  .tech-item .tname{font-weight:700}
  .muted{color:var(--muted)}
  .empty{color:var(--muted2);font-style:italic;text-align:center;padding:60px 20px}
  .planet-trait-key{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
  .sc-card{cursor:pointer}
  .sc-init{font-size:26px;font-weight:800;color:var(--gold);line-height:1}
  .pa{margin-bottom:10px}
  .pa .pa-lab{font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:700}
  .pa.primary .pa-lab{color:var(--gold)}
  .pa.secondary .pa-lab{color:var(--cyan)}
  .note{font-size:13px;color:var(--muted2);background:rgba(232,195,114,.06);border:1px dashed var(--gold-dim);
    border-radius:8px;padding:10px 14px;margin:10px 0}
  /* Objectifs */
  .obj-row{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border)}
  .obj-row:last-child{border-bottom:none}
  .obj-pts{flex:0 0 auto;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:15px;background:var(--panel2);border:1px solid var(--border);color:var(--gold)}
  .obj-row .o-name{font-weight:700}
  .o-text{color:var(--muted);font-size:13.5px;margin-top:2px}
  /* Agendas */
  .ag-item{padding:10px 0;border-bottom:1px solid var(--border)}
  .ag-item:last-child{border-bottom:none}
  .ag-item .ag-name{font-weight:700}
  .pill-law{background:rgba(224,114,106,.18);color:var(--red)}
  .pill-dir{background:rgba(106,166,224,.18);color:var(--blue)}
  /* Séquence */
  .seq-step{padding:7px 0 7px 16px;border-left:2px solid var(--border);margin:6px 0 6px 4px}
  .seq-step .ss-name{font-weight:700}
  .seq-step .ss-text{color:var(--muted);font-size:13.5px}
  .seq-num{display:inline-flex;width:22px;height:22px;border-radius:50%;background:var(--gold);color:#1a1407;
    align-items:center;justify-content:center;font-weight:800;font-size:12px;margin-right:8px;flex:0 0 auto}
  /* Draft */
  .draft-ctrl{display:flex;flex-direction:column;gap:12px}
  .draft-ctrl label{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;font-weight:700;display:block;margin-bottom:4px}
  .draft-ctrl select,.draft-ctrl input[type=number]{width:100%;background:var(--panel);border:1px solid var(--border);
    color:var(--text);border-radius:8px;padding:8px 10px;font-size:14px;outline:none}
  .btn{background:var(--gold);color:#1a1407;border:none;border-radius:8px;padding:10px 14px;font-weight:700;cursor:pointer;font-size:14px}
  .btn:hover{filter:brightness(1.08)}
  .btn-ghost{background:var(--panel);color:var(--text);border:1px solid var(--border)}
  .draft-slot{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px}
  .draft-slot .ds-player{font-weight:700;color:var(--gold);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
  .draft-fac{display:inline-flex;align-items:center;gap:8px;padding:5px 10px;border:1px solid var(--border);
    border-radius:8px;margin:3px 6px 3px 0;font-size:13px}
  .toggle-row{display:flex;gap:8px;flex-wrap:wrap}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#23304d;border-radius:5px}
  ::-webkit-scrollbar-track{background:transparent}
  @media (max-width:860px){
    .app{grid-template-columns:1fr;grid-template-areas:"header" "main"}
    aside{position:fixed;top:0;left:0;bottom:0;width:280px;max-width:85vw;z-index:50;
      transform:translateX(-100%);transition:transform .22s ease;box-shadow:6px 0 30px rgba(0,0,0,.6);
      padding-top:58px}
    aside.open{transform:translateX(0)}
    .menu-btn{display:inline-flex}
    .scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:40;display:none}
    .scrim.open{display:block}
    header{flex-wrap:wrap;gap:10px}
    header h1{font-size:15px;white-space:normal}
    #search{width:130px}
    main{padding:18px 16px}
  }
  @media print{
    aside,header{display:none}
    .app{display:block}
    main{padding:0}
    section.block{break-inside:avoid;box-shadow:none}
    body{background:#fff;color:#000}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <button type="button" class="menu-btn" id="menuBtn" aria-label="Menu">☰</button>
    <h1><span class="ti">Twilight Imperium IV</span> · Aide de jeu</h1>
    <div class="tabs" id="tabs">
      <div class="tab" data-view="factions">Factions</div>
      <div class="tab" data-view="strategy">Cartes Stratégie</div>
      <div class="tab" data-view="planets">Planètes</div>
      <div class="tab" data-view="units">Unités</div>
      <div class="tab" data-view="objectives">Objectifs</div>
      <div class="tab" data-view="agendas">Projets</div>
      <div class="tab" data-view="relics">Reliques</div>
      <div class="tab" data-view="exploration">Exploration</div>
      <div class="tab" data-view="sequence">Déroulement</div>
      <div class="tab" data-view="draft">Draft</div>
    </div>
    <div class="search-wrap">
      <input id="search" type="text" placeholder="Rechercher…" autocomplete="off">
    </div>
  </header>
  <aside id="sidebar"></aside>
  <div class="scrim" id="scrim"></div>
  <main><div class="content" id="content"></div></main>
</div>

<!-- Données du jeu — modifiables dans data.js (même dossier) -->
<script src="data.js"></script>
<script>
/* ===================================================================
   MOTEUR D'AFFICHAGE
   =================================================================== */
const $ = s => document.querySelector(s);
const el = (t, c, h) => { const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e; };
const esc = s => (s==null?'':String(s)).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
const EXP_LABEL = {base:'Base', pok:'PoK', codex:'Codex'};
const TRAIT_CLASS = {cultural:'t-cultural',hazardous:'t-hazardous',industrial:'t-industrial'};
const TRAIT_FR = {cultural:'Culturelle',hazardous:'Dangereuse',industrial:'Industrielle'};
const TECH_FR = {green:'Vert',blue:'Bleu',red:'Rouge',yellow:'Jaune',unit:'Unité',
  biotic:'Biotique',propulsion:'Propulsion',warfare:'Guerre',cybernetic:'Cybernétique'};
const PHASE_FR = {action:'Action', status:'Statut', agenda:'Projet'};
const CONTENT_SEARCH = ['planets','units','objectives','agendas','relics','exploration'];

const state = { view:'factions', selected:null, expFilter:'all', query:'',
  objFilter:'all', agendaFilter:'all', exploreFilter:'all',
  draft:{ players:6, pok:true, codex:false, mode:'pool', poolSize:2, result:null } };

/* Filtres en chips dans la sidebar */
function sideChips(title, options, current, onPick){
  const sb=$('#sidebar');
  if(title) sb.appendChild(el('div','side-title',title));
  const filt=el('div','filters');
  options.forEach(o=>{
    const c=el('div','chip',o.lab); c.style.fontSize='12px';
    if(current===o.val){ c.style.borderColor='var(--gold-dim)'; c.style.color='var(--gold)'; }
    c.onclick=()=>onPick(o.val);
    filt.appendChild(c);
  });
  sb.appendChild(filt);
}

function setView(v){
  state.view=v; state.query=''; $('#search').value='';
  if(v==='factions'){ state.selected = state.selected || (TI4_DATA.factions[0]&&TI4_DATA.factions[0].id); }
  if(v==='strategy'){ state.selected = TI4_DATA.strategyCards[0] && TI4_DATA.strategyCards[0].id; }
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.view===v));
  const ph={factions:'Rechercher une faction…',strategy:'Rechercher une carte…',planets:'Rechercher une planète…',
    units:'Rechercher une unité…',objectives:'Rechercher un objectif…',agendas:'Rechercher un agenda…',
    relics:'Rechercher une relique…',exploration:'Rechercher une carte…'};
  ph.agendas='Rechercher un projet…';
  $('#search').placeholder = ph[v] || 'Rechercher…';
  $('#search').parentElement.style.display = (v==='sequence'||v==='draft') ? 'none' : '';
  renderSidebar(); renderContent();
}

/* ---------- Sidebar ---------- */
function renderSidebar(){
  const sb = $('#sidebar'); sb.innerHTML='';
  const q = state.query.toLowerCase();
  if(state.view==='factions'){
    const filt = el('div','filters');
    ['all','base','pok','codex'].forEach(e=>{
      const c = el('div','chip'+(state.expFilter===e?' active':''), e==='all'?'Toutes':EXP_LABEL[e]);
      c.dataset.exp=e; c.onclick=()=>{state.expFilter=e;renderSidebar();};
      filt.appendChild(c);
    });
    sb.appendChild(filt);
    TI4_DATA.factions
      .filter(f=> state.expFilter==='all' || f.expansion===state.expFilter)
      .filter(f=> !q || (f.nameFr||'').toLowerCase().includes(q) || f.name.toLowerCase().includes(q) || (f.summary||'').toLowerCase().includes(q))
      .forEach(f=>{
        const it = el('div','nav-item'+(f.id===state.selected?' active':''));
        it.innerHTML = `<span class="dot" style="background:${f.color||'#888'}"></span>
          <span class="name">${esc(f.nameFr||f.name)}</span>
          <span class="badge ${f.expansion}">${EXP_LABEL[f.expansion]}</span>`;
        it.onclick=()=>{state.selected=f.id;renderSidebar();renderContent();window.scrollTo(0,0);closeNav();};
        sb.appendChild(it);
      });
  } else if(state.view==='strategy'){
    [...TI4_DATA.strategyCards].sort((a,b)=>a.initiative-b.initiative)
      .filter(c=> !q || c.name.toLowerCase().includes(q))
      .forEach(c=>{
        const it = el('div','nav-item'+(c.id===state.selected?' active':''));
        it.innerHTML = `<span class="sc-init" style="font-size:16px;min-width:18px">${c.initiative}</span>
          <span class="name">${esc(c.name)}</span>`;
        it.onclick=()=>{state.selected=c.id;renderSidebar();renderContent();closeNav();};
        sb.appendChild(it);
      });
  } else if(state.view==='objectives'){
    sideChips('Filtrer',[{val:'all',lab:'Tous'},{val:'stage1',lab:'Étape I'},{val:'stage2',lab:'Étape II'},{val:'secret',lab:'Secrets'}],
      state.objFilter, v=>{state.objFilter=v;renderSidebar();renderContent();});
  } else if(state.view==='agendas'){
    sideChips('Filtrer',[{val:'all',lab:'Tous'},{val:'law',lab:'Lois'},{val:'directive',lab:'Directives'}],
      state.agendaFilter, v=>{state.agendaFilter=v;renderSidebar();renderContent();});
  } else if(state.view==='exploration'){
    sideChips('Type de planète',[{val:'all',lab:'Toutes'},{val:'cultural',lab:'Culturelle'},{val:'hazardous',lab:'Dangereuse'},{val:'industrial',lab:'Industrielle'},{val:'frontier',lab:'Frontière'}],
      state.exploreFilter, v=>{state.exploreFilter=v;renderSidebar();renderContent();});
  } else if(state.view==='draft'){
    renderDraftControls(sb);
  } else if(state.view==='sequence'){
    sb.appendChild(el('div','side-title','Phases'));
    (TI4_DATA.turnSequence||[]).forEach((p,i)=>{
      const it=el('div','nav-item');
      it.innerHTML=`<span class="seq-num">${i+1}</span><span class="name">${esc(p.phase)}</span>`;
      it.onclick=()=>{ const t=document.getElementById('seq-'+i); if(t) t.scrollIntoView({behavior:'smooth',block:'start'}); };
      sb.appendChild(it);
    });
  } else {
    const titles={planets:'Planètes',units:'Référence unités',relics:'Reliques'};
    sb.appendChild(el('div','side-title', titles[state.view]||''));
  }
}

/* ---------- Content ---------- */
function renderContent(){
  const c = $('#content'); c.innerHTML='';
  if(state.view==='factions') return renderFaction(c);
  if(state.view==='strategy') return renderStrategy(c);
  if(state.view==='planets') return renderPlanets(c);
  if(state.view==='units') return renderUnits(c);
  if(state.view==='objectives') return renderObjectives(c);
  if(state.view==='agendas') return renderAgendas(c);
  if(state.view==='relics') return renderRelics(c);
  if(state.view==='exploration') return renderExploration(c);
  if(state.view==='sequence') return renderSequence(c);
  if(state.view==='draft') return renderDraft(c);
}

function block(title, inner){
  const s = el('section','block');
  s.appendChild(el('h3',null,esc(title)));
  if(typeof inner==='string') s.insertAdjacentHTML('beforeend', inner);
  else if(inner) s.appendChild(inner);
  return s;
}

function renderFaction(c){
  const f = TI4_DATA.factions.find(x=>x.id===state.selected);
  if(!f){ c.innerHTML='<div class="empty">Aucune donnée de faction chargée.</div>'; return; }
  const head = el('div','faction-head');
  head.innerHTML = `<span class="dot" style="background:${f.color||'#888'}"></span>
    <div class="fac-title"><h2>${esc(f.nameFr||f.name)}</h2>${f.nameFr?`<div class="fac-en">${esc(f.name)}</div>`:''}</div>
    <span class="badge ${f.expansion}">${EXP_LABEL[f.expansion]}</span>`;
  c.appendChild(head);
  if(f.summary) c.appendChild(el('div','summary',esc(f.summary)));

  // Abilities
  if(f.abilities&&f.abilities.length){
    const wrap=el('div');
    f.abilities.forEach(a=>wrap.appendChild(el('div','ability',
      `<div class="ab-name">${esc(a.name)}</div><div class="ab-text">${esc(a.text)}</div>`)));
    c.appendChild(block('Compétences de faction', wrap));
  }
  // Setup
  const setup=el('div','kv');
  if(f.startingUnits) setup.innerHTML+=`<div class="k">Unités de départ</div><div>${esc(f.startingUnits)}</div>`;
  if(f.startingTech&&f.startingTech.length) setup.innerHTML+=`<div class="k">Tech de départ</div><div>${f.startingTech.map(esc).join(', ')||'—'}</div>`;
  if(f.commodities!=null) setup.innerHTML+=`<div class="k">Commodités</div><div>${esc(f.commodities)}</div>`;
  if(setup.innerHTML) c.appendChild(block('Mise en place', setup));

  // Home system
  if(f.homeSystem && f.homeSystem.planets && f.homeSystem.planets.length){
    let t=`<div class="muted" style="margin-bottom:8px">Système : <b>${esc(f.homeSystem.name||'—')}</b></div>
      <table><thead><tr><th>Planète</th><th class="num">Ressources</th><th class="num">Influence</th><th>Type</th><th>Spécialité tech</th></tr></thead><tbody>`;
    f.homeSystem.planets.forEach(p=>{
      t+=`<tr><td>${esc(p.name)}</td><td class="num">${p.resources}</td><td class="num">${p.influence}</td>
        <td>${p.trait?`<span class="pill ${TRAIT_CLASS[p.trait]}">${TRAIT_FR[p.trait]||p.trait}</span>`:'—'}</td>
        <td>${p.techSpecialty?`<span class="pill t-${p.techSpecialty}">${TECH_FR[p.techSpecialty]||p.techSpecialty}</span>`:'—'}</td></tr>`;
    });
    t+='</tbody></table>';
    c.appendChild(block('Système-mère', t));
  }

  // Leaders
  const L=f.leaders||{};
  if(L.agent||L.commander||L.hero){
    const wrap=el('div');
    const mk=(role,cls,d)=>{ if(!d)return;
      wrap.appendChild(el('div','leader '+cls,
        `<div class="l-role">${role}</div><div class="l-name">${esc(d.name)}</div>
         ${d.unlock?`<div class="l-unlock"><b>Déblocage :</b> ${esc(d.unlock)}</div>`:''}
         <div class="l-text">${esc(d.text)}</div>`)); };
    mk('Agent','agent',L.agent); mk('Commandant','commander',L.commander); mk('Héros','hero',L.hero);
    c.appendChild(block('Leaders', wrap));
  }

  // Flagship & Mech
  if(f.flagship){
    const fs=f.flagship;
    const sl=`<div class="statline">
      ${statBox('Coût',fs.cost)}${statBox('Combat',fs.combat)}${statBox('Mvt',fs.move)}${statBox('Capacité',fs.capacity)}</div>`;
    c.appendChild(block('Vaisseau amiral — '+esc(fs.name), sl+`<div class="ab-text">${esc(fs.text)}</div>`));
  }
  if(f.mech){
    c.appendChild(block('Méca — '+esc(f.mech.name), `<div class="ab-text">${esc(f.mech.text)}</div>`));
  }

  // Faction units
  if(f.factionUnits&&f.factionUnits.length){
    let t=`<table><thead><tr><th>Unité</th><th class="num">Coût</th><th class="num">Combat</th><th class="num">Mvt</th><th class="num">Cap.</th><th>Effet</th></tr></thead><tbody>`;
    f.factionUnits.forEach(u=>{
      t+=`<tr><td><b>${esc(u.name)}</b></td><td class="num">${esc(u.cost||'—')}</td><td class="num">${esc(u.combat||'—')}</td>
        <td class="num">${esc(u.move||'—')}</td><td class="num">${esc(u.capacity||'—')}</td><td class="muted">${esc(u.text||'')}</td></tr>`;
    });
    t+='</tbody></table>';
    c.appendChild(block('Unités spécifiques / améliorations', t));
  }

  // Faction tech
  if(f.factionTech&&f.factionTech.length){
    const wrap=el('div');
    f.factionTech.forEach(tk=>{
      wrap.appendChild(el('div','tech-item',
        `<div class="tname">${esc(tk.name)} ${tk.type?`<span class="pill t-${tk.type}">${TECH_FR[tk.type]||tk.type}</span>`:''}</div>
         ${tk.prereqs?`<div class="muted" style="font-size:12px">Prérequis : ${esc(tk.prereqs)}</div>`:''}
         <div class="ab-text">${esc(tk.text)}</div>`));
    });
    c.appendChild(block('Technologies de faction', wrap));
  }

  // Promissory note
  if(f.promissoryNote){
    c.appendChild(block('Note de promesse — '+esc(f.promissoryNote.name),
      `<div class="ab-text">${esc(f.promissoryNote.text)}</div>`));
  }

  if(f.notes) c.appendChild(el('div','note',esc(f.notes)));
}
function statBox(lab,val){return `<div class="stat"><div class="s-lab">${lab}</div><div class="s-val">${esc(val??'—')}</div></div>`;}

function renderStrategy(c){
  const card = TI4_DATA.strategyCards.find(x=>x.id===state.selected);
  if(!card){ c.innerHTML='<div class="empty">Aucune carte stratégie chargée.</div>'; return; }
  const head=el('div','faction-head');
  head.innerHTML=`<span class="sc-init">${card.initiative}</span><h2>${esc(card.name)}</h2>`;
  c.appendChild(head);
  c.appendChild(el('div','summary','Initiative '+card.initiative));
  const wrap=el('div');
  wrap.appendChild(el('div','pa primary',`<div class="pa-lab">Compétence primaire</div><div class="ab-text">${esc(card.primary)}</div>`));
  wrap.appendChild(el('div','pa secondary',`<div class="pa-lab">Compétence secondaire</div><div class="ab-text">${esc(card.secondary)}</div>`));
  c.appendChild(block('Effets', wrap));
}

function renderPlanets(c){
  c.appendChild(el('div','faction-head','<h2>Planètes</h2>'));
  c.appendChild(el('div','planet-trait-key',
    '<span><span class="pill t-cultural">Culturelle</span></span><span><span class="pill t-hazardous">Dangereuse</span></span><span><span class="pill t-industrial">Industrielle</span></span>'));
  const q=state.query.toLowerCase();
  const rows=TI4_DATA.planets.filter(p=>!q||p.name.toLowerCase().includes(q)||(p.system||'').toLowerCase().includes(q));
  if(!rows.length){ c.appendChild(el('div','empty', q?'Aucune planète trouvée.':'Aucune donnée de planète chargée.')); return; }
  let t=`<table><thead><tr><th>Planète</th><th class="num">Ressources</th><th class="num">Influence</th><th>Type</th><th>Spécialité</th><th>Système / Source</th></tr></thead><tbody>`;
  rows.sort((a,b)=>a.name.localeCompare(b.name)).forEach(p=>{
    t+=`<tr><td><b>${esc(p.name)}</b>${p.legendary?' <span class="pill t-yellow">Légendaire</span>':''}</td>
      <td class="num">${p.resources}</td><td class="num">${p.influence}</td>
      <td>${p.trait?`<span class="pill ${TRAIT_CLASS[p.trait]}">${TRAIT_FR[p.trait]||p.trait}</span>`:'—'}</td>
      <td>${p.techSpecialty?`<span class="pill t-${p.techSpecialty}">${TECH_FR[p.techSpecialty]||p.techSpecialty}</span>`:'—'}</td>
      <td class="muted">${esc(p.system||'')}</td></tr>`;
  });
  t+='</tbody></table>';
  const b=block('Liste complète ('+rows.length+')', t); c.appendChild(b);
}

function renderUnits(c){
  c.appendChild(el('div','faction-head','<h2>Statistiques des unités</h2>'));
  c.appendChild(el('div','summary','Valeurs de base. Les améliorations (niveau II) et unités de faction sont indiquées sur chaque fiche de faction.'));
  if(!TI4_DATA.unitStats.length){ c.appendChild(el('div','empty','Aucune donnée d\'unité chargée.')); return; }
  let t=`<table><thead><tr><th>Unité</th><th class="num">Coût</th><th class="num">Combat</th><th class="num">Mvt</th><th class="num">Capacité</th><th>Capacités</th></tr></thead><tbody>`;
  TI4_DATA.unitStats.forEach(u=>{
    t+=`<tr><td><b>${esc(u.unit)}</b>${u.upgrade?' <span class="pill t-unit">II</span>':''}</td>
      <td class="num">${esc(u.cost||'—')}</td><td class="num">${esc(u.combat||'—')}</td>
      <td class="num">${esc(u.move||'—')}</td><td class="num">${esc(u.capacity||'—')}</td>
      <td class="muted">${(u.abilities||[]).map(esc).join(', ')||'—'}</td></tr>`;
  });
  t+='</tbody></table>';
  c.appendChild(block('Unités', t));
}

/* ---------- Objectifs ---------- */
function renderObjectives(c){
  c.appendChild(el('div','faction-head','<h2>Objectifs</h2>'));
  const data=TI4_DATA.objectives||[];
  if(!data.length){ c.appendChild(el('div','empty','Aucun objectif chargé.')); return; }
  const q=state.query.toLowerCase(), f=state.objFilter;
  const match=o=> !q || o.name.toLowerCase().includes(q) || (o.text||'').toLowerCase().includes(q);
  const groups=[
    {key:'stage1', title:'Publics — Étape I (1 PV)', sel:o=>o.kind==='public'&&o.stage===1},
    {key:'stage2', title:'Publics — Étape II (2 PV)', sel:o=>o.kind==='public'&&o.stage===2},
    {key:'secret', title:'Secrets (1 PV)', sel:o=>o.kind==='secret'},
  ];
  let shown=0;
  groups.forEach(g=>{
    if(f!=='all' && f!==g.key) return;
    const rows=data.filter(g.sel).filter(match);
    if(!rows.length) return;
    shown+=rows.length;
    const wrap=el('div');
    rows.forEach(o=>{
      const pts = o.kind==='secret' ? '1' : (o.points||(o.stage===2?2:1));
      const phase = o.phase ? `<span class="pill t-yellow">${PHASE_FR[o.phase]||o.phase}</span> ` : '';
      wrap.appendChild(el('div','obj-row',
        `<div class="obj-pts">${esc(pts)}</div>
         <div><div class="o-name">${esc(o.name)} <span class="badge ${o.expansion||'base'}">${EXP_LABEL[o.expansion]||''}</span></div>
         <div class="o-text">${phase}${esc(o.text)}</div></div>`));
    });
    c.appendChild(block(g.title+' ('+rows.length+')', wrap));
  });
  if(!shown) c.appendChild(el('div','empty','Aucun objectif trouvé.'));
}

/* ---------- Agendas ---------- */
function renderAgendas(c){
  c.appendChild(el('div','faction-head','<h2>Projets — Lois & Directives</h2>'));
  const data=TI4_DATA.agendas||[];
  if(!data.length){ c.appendChild(el('div','empty','Aucun projet chargé.')); return; }
  const q=state.query.toLowerCase();
  const rows=data.filter(a=> state.agendaFilter==='all'||a.type===state.agendaFilter)
    .filter(a=> !q||a.name.toLowerCase().includes(q)||(a.text||'').toLowerCase().includes(q));
  if(!rows.length){ c.appendChild(el('div','empty','Aucun projet trouvé.')); return; }
  const wrap=el('div');
  rows.forEach(a=>{
    const tp = a.type==='law' ? '<span class="pill pill-law">Loi</span>' : '<span class="pill pill-dir">Directive</span>';
    wrap.appendChild(el('div','ag-item',
      `<div class="ag-name">${esc(a.name)} ${tp} <span class="badge ${a.expansion||'base'}">${EXP_LABEL[a.expansion]||''}</span></div>
       ${a.elect?`<div class="muted" style="font-size:12px;margin-top:2px">Élit : ${esc(a.elect)}</div>`:''}
       <div class="o-text">${esc(a.text)}</div>`));
  });
  c.appendChild(block('Projets ('+rows.length+')', wrap));
}

/* ---------- Reliques ---------- */
function renderRelics(c){
  c.appendChild(el('div','faction-head','<h2>Reliques</h2>'));
  const data=TI4_DATA.relics||[];
  if(!data.length){ c.appendChild(el('div','empty','Aucune relique chargée.')); return; }
  const q=state.query.toLowerCase();
  const rows=data.filter(r=> !q||r.name.toLowerCase().includes(q)||(r.text||'').toLowerCase().includes(q));
  const wrap=el('div');
  rows.forEach(r=> wrap.appendChild(el('div','ability',
    `<div class="ab-name">${esc(r.name)} <span class="badge ${r.expansion||'pok'}">${EXP_LABEL[r.expansion]||''}</span></div>
     <div class="ab-text">${esc(r.text)}</div>`)));
  c.appendChild(block('Reliques ('+rows.length+')', wrap));
}

/* ---------- Exploration ---------- */
function renderExploration(c){
  c.appendChild(el('div','faction-head',"<h2>Cartes d'exploration</h2>"));
  const data=TI4_DATA.exploration||[];
  if(!data.length){ c.appendChild(el('div','empty',"Aucune carte d'exploration chargée.")); return; }
  const q=state.query.toLowerCase();
  const traits=[{key:'cultural',title:'Culturelle'},{key:'hazardous',title:'Dangereuse'},{key:'industrial',title:'Industrielle'},{key:'frontier',title:'Frontière'}];
  let shown=0;
  traits.forEach(tr=>{
    if(state.exploreFilter!=='all' && state.exploreFilter!==tr.key) return;
    const rows=data.filter(x=>x.trait===tr.key).filter(x=>!q||x.name.toLowerCase().includes(q)||(x.text||'').toLowerCase().includes(q));
    if(!rows.length) return;
    shown+=rows.length;
    const wrap=el('div');
    rows.forEach(x=> wrap.appendChild(el('div','ability',
      `<div class="ab-name">${esc(x.name)} ${x.type?`<span class="pill t-unit">${esc(x.type)}</span>`:''}</div>
       <div class="ab-text">${esc(x.text)}</div>`)));
    c.appendChild(block(tr.title+' ('+rows.length+')', wrap));
  });
  if(!shown) c.appendChild(el('div','empty','Aucune carte trouvée.'));
}

/* ---------- Déroulement ---------- */
function renderSequence(c){
  c.appendChild(el('div','faction-head',"<h2>Déroulement d'un round</h2>"));
  c.appendChild(el('div','summary','Séquence des phases (version Prophecy of Kings).'));
  const data=TI4_DATA.turnSequence||[];
  if(!data.length){ c.appendChild(el('div','empty','Aucune donnée.')); return; }
  data.forEach((p,i)=>{
    const wrap=el('div');
    if(p.summary) wrap.appendChild(el('div','ab-text',`<i>${esc(p.summary)}</i>`));
    (p.steps||[]).forEach(s=> wrap.appendChild(el('div','seq-step',
      `<div class="ss-name">${esc(s.name)}</div><div class="ss-text">${esc(s.text)}</div>`)));
    const sec=block(`Phase ${i+1} — ${p.phase}`, wrap);
    sec.id='seq-'+i;
    c.appendChild(sec);
  });
}

/* ---------- Draft ---------- */
const KELERES_PARENTS=['argent-flight','the-mentak-coalition','xxcha-kingdom'];
function dShuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function eligibleFactions(){
  const d=state.draft;
  return TI4_DATA.factions.filter(f=> f.expansion==='base' || (f.expansion==='pok'&&d.pok) || (f.expansion==='codex'&&d.codex));
}
function draftConflict(set){
  const ids=set.map(f=>f.id);
  return ids.includes('the-council-keleres') && KELERES_PARENTS.some(p=>ids.includes(p));
}
function generateDraft(){
  const d=state.draft, elig=eligibleFactions();
  const need = d.mode==='pool' ? d.players*d.poolSize : d.players;
  if(need>elig.length){ d.result={error:`Pas assez de factions disponibles (${elig.length}) pour ${need} requises. Réduisez le nombre de joueurs ou la taille du pool, ou activez PoK / Codex.`}; return; }
  let chosen=null;
  for(let t=0;t<300;t++){ const pick=dShuffle(elig).slice(0,need); if(!draftConflict(pick)){ chosen=pick; break; } }
  if(!chosen) chosen=dShuffle(elig).slice(0,need);
  const order=dShuffle(Array.from({length:d.players},(_,i)=>i+1));
  const slots=[];
  for(let p=0;p<d.players;p++){
    const facs = d.mode==='pool' ? chosen.slice(p*d.poolSize,(p+1)*d.poolSize) : [chosen[p]];
    slots.push({player:p+1, speaker:order.indexOf(p+1)+1, factions:facs});
  }
  d.result={slots};
}
function renderDraftControls(sb){
  const d=state.draft;
  sb.appendChild(el('div','side-title','Assistant de draft'));
  const box=el('div','draft-ctrl');
  box.innerHTML=`
    <div><label>Nombre de joueurs</label><input type="number" id="d-players" min="2" max="8" value="${d.players}"></div>
    <div><label>Mode</label><select id="d-mode">
      <option value="assign"${d.mode==='assign'?' selected':''}>1 faction / joueur</option>
      <option value="pool"${d.mode==='pool'?' selected':''}>Pool de choix / joueur</option>
    </select></div>
    <div id="d-poolwrap" style="${d.mode==='pool'?'':'display:none'}"><label>Factions par joueur</label><input type="number" id="d-poolsize" min="2" max="5" value="${d.poolSize}"></div>
    <div><label>Contenu inclus</label><div class="toggle-row"><span class="chip" id="d-pok">PoK</span><span class="chip" id="d-codex">Codex</span></div></div>
    <button class="btn" id="d-gen">🎲 Générer</button>`;
  sb.appendChild(box);
  const mark=(id,on)=>{ const e=box.querySelector('#'+id); if(on){e.style.borderColor='var(--gold-dim)';e.style.color='var(--gold)';} };
  mark('d-pok',d.pok); mark('d-codex',d.codex);
  box.querySelector('#d-pok').onclick=()=>{ d.pok=!d.pok; renderSidebar(); };
  box.querySelector('#d-codex').onclick=()=>{ d.codex=!d.codex; renderSidebar(); };
  box.querySelector('#d-players').onchange=e=>{ d.players=Math.max(2,Math.min(8,+e.target.value||6)); };
  box.querySelector('#d-mode').onchange=e=>{ d.mode=e.target.value; renderSidebar(); };
  const ps=box.querySelector('#d-poolsize'); if(ps) ps.onchange=e=>{ d.poolSize=Math.max(2,Math.min(5,+e.target.value||2)); };
  box.querySelector('#d-gen').onclick=()=>{ generateDraft(); renderContent(); closeNav(); };
}
function renderDraft(c){
  c.appendChild(el('div','faction-head','<h2>Assistant de draft</h2>'));
  c.appendChild(el('div','summary','Réglez les options dans le panneau de gauche, puis cliquez sur « Générer ». La contrainte du Conseil Keleres (incompatible avec Argent / Mentak / Xxcha) est respectée automatiquement.'));
  const r=state.draft.result;
  if(!r){ c.appendChild(el('div','empty','Configurez à gauche puis cliquez sur « Générer ».')); return; }
  if(r.error){ c.appendChild(el('div','note',esc(r.error))); return; }
  const wrap=el('div');
  r.slots.forEach(s=>{
    const facHtml=s.factions.map(f=>`<span class="draft-fac"><span class="dot" style="background:${f.color||'#888'}"></span>${esc(f.name)} <span class="badge ${f.expansion}">${EXP_LABEL[f.expansion]}</span></span>`).join('');
    wrap.appendChild(el('div','draft-slot',
      `<div class="ds-player"><span>Joueur ${s.player}</span><span class="muted" style="font-weight:600;font-size:12px">Ordre orateur : ${s.speaker}</span></div><div>${facHtml}</div>`));
  });
  c.appendChild(block(state.draft.mode==='pool'?'Pools de factions':'Factions attribuées', wrap));
  const again=el('button','btn btn-ghost','🎲 Regénérer'); again.style.marginTop='4px';
  again.onclick=()=>{ generateDraft(); renderContent(); };
  c.appendChild(again);
}

/* ---------- Events ---------- */
function closeNav(){ const s=$('#sidebar'),sc=$('#scrim'); if(s)s.classList.remove('open'); if(sc)sc.classList.remove('open'); }
function toggleNav(){ const s=$('#sidebar'),sc=$('#scrim'); const o=!s.classList.contains('open'); s.classList.toggle('open',o); if(sc)sc.classList.toggle('open',o); }
$('#menuBtn').onclick=toggleNav;
$('#scrim').onclick=closeNav;
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{setView(t.dataset.view);closeNav();});
$('#search').addEventListener('input', e=>{
  state.query=e.target.value;
  if(CONTENT_SEARCH.includes(state.view)) renderContent();
  else if(state.view==='factions'||state.view==='strategy') renderSidebar();
});

/* ---------- Init ---------- */
setView('factions');
</script>
